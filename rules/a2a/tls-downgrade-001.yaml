id: a2a-tls-downgrade-001
info:
  name: A2A Endpoint Accessible Over Plain HTTP
  author: batesian
  severity: high
  description: |
    Tests whether the A2A agent card endpoint and JSON-RPC endpoint accept
    connections over unencrypted plain HTTP rather than enforcing HTTPS.

    Agents that serve traffic over HTTP expose all communication to passive
    eavesdroppers on any network path between the caller and the server.
    An attacker positioned on the network (Wi-Fi, enterprise proxy, cloud
    VPC routing) can read A2A tasks, agent capabilities, bearer tokens, and
    JWS-signed payloads in the clear.

    Detection:
    1. Rewrite the target URL scheme from https to http.
    2. Send GET requests for the agent card well-known paths.
    3. Send a minimal JSON-RPC POST (tasks/send) over http.
    4. Confirm whether the server accepts the connection with a 2xx response
       rather than redirecting to HTTPS (301/302) or refusing the connection.

    Note: if the target URL is already http, the test confirms the server
    does not enforce TLS from the start.

  references:
    - https://google.github.io/A2A/specification/
    - https://owasp.org/www-project-top-10-for-large-language-model-applications/
    - https://cwe.mitre.org/data/definitions/319.html

  tags:
    - a2a
    - tls
    - transport-security
    - cleartext
    - cwe-319

attack:
  protocol: a2a
  type: a2a-tls-downgrade

assert:
  - condition: agent_card_over_http
    description: "Agent Card endpoint responds over plain HTTP without HTTPS redirect"
    severity: high

  - condition: rpc_endpoint_over_http
    description: "A2A JSON-RPC endpoint accepts requests over plain HTTP"
    severity: high

remediation: |
  1. Serve all A2A endpoints exclusively over HTTPS (TLS 1.2 minimum, TLS 1.3
     recommended).
  2. Return HTTP 301 or HTTP 308 redirects from the plain-HTTP port to HTTPS.
     Do not return 200 for plain-HTTP requests.
  3. Include a Strict-Transport-Security header with a long max-age
     (at least 31536000 seconds) and includeSubDomains on all HTTPS responses.
  4. Reject any request whose Host header does not match the expected domain,
     to prevent HTTP host-override attacks that bypass TLS enforcement.
