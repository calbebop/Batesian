id: mcp-injection-params-001
info:
  name: MCP Tool Call Parameter Injection (SQL / Command / XSS)
  author: batesian
  severity: high
  description: |
    Tests whether an MCP server's tool call handlers sanitize input parameters
    against classical injection attacks: SQL injection, OS command injection,
    path traversal, and XSS payload reflection.

    MCP tool call parameters are string arguments passed from the LLM to the
    server. If a tool passes these arguments unsanitized to a database query,
    shell command, file path, or HTML template, the server is vulnerable to
    the same injection classes that affect traditional web applications.

    The attack surface is novel: unlike web forms, MCP tool arguments are
    generated by an LLM that may be tricked into generating malicious payloads
    via prompt injection in tool descriptions (mcp-tool-poison-001). This means
    injection vulnerabilities in tool handlers are directly exploitable via a
    two-stage attack: inject a payload into a tool description, cause the LLM
    to call the tool with the injected argument, then exploit the server-side
    handler.

    Detection: send tools/call requests with injection payloads as argument
    values and check for:
    1. SQL error strings (MySQL, PostgreSQL, SQLite error messages)
    2. Stack traces containing file paths or function names
    3. OS command output artifacts (uid=, passwd fragments)
    4. Reflection of script tags in response content

  references:
    - https://modelcontextprotocol.io/docs/concepts/tools
    - https://owasp.org/www-project-web-security-testing-guide/
    - https://owasp.org/www-project-top-10-for-large-language-model-applications/

  tags:
    - mcp
    - injection
    - sql-injection
    - command-injection
    - xss
    - tool

attack:
  protocol: mcp
  type: mcp-injection-params

assert:
  - condition: sql_error_in_response
    description: "SQL error message detected in tool call response"
    severity: high

  - condition: command_output_in_response
    description: "OS command execution artifact detected in tool call response"
    severity: critical

  - condition: path_traversal_reflected
    description: "Path traversal sequence reflected or resolved in tool call response"
    severity: high

  - condition: script_tag_reflected
    description: "XSS payload reflected unescaped in tool call response"
    severity: medium

  - condition: stack_trace_in_response
    description: "Server stack trace or internal path exposed in tool call error response"
    severity: medium

remediation: |
  1. Treat all tool call argument values as untrusted input. Never interpolate
     them directly into SQL queries, shell commands, file paths, or HTML.
  2. Use parameterized queries (prepared statements) for all database access.
  3. Use subprocess APIs (exec, spawn) instead of shell string interpolation
     for OS commands. If shell is required, use strict argument allowlisting.
  4. Sanitize file paths using a real path resolution function and confirm
     the resolved path is within the intended base directory.
  5. Return sanitized error messages to callers; log full stack traces server-
     side only, never in JSON-RPC error responses.
