version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: package-comments
          severity: warning
        - name: var-naming
        - name: unused-parameter
          disabled: true

    gosec:
      excludes:
        - G104
      severity: medium
      confidence: medium

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: cmd/batesian/main\.go
        linters:
          - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
