version: 2

project_name: batesian

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: batesian
    main: ./cmd/batesian
    binary: batesian
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Exclude windows/arm64 — uncommon and adds release size without benefit.
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -trimpath
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'merge conflict'
      - Merge pull request
      - Merge branch
  groups:
    - title: New attack rules
      regexp: '^.*?rule(\(.+\))??!?:.+$'
      order: 0
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 1
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999

release:
  github:
    owner: calvin-mcdowell
    name: batesian
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Batesian {{.Version}}

    Adversarial red-team CLI for AI agent protocols (A2A and MCP).

    ### Install

    ```bash
    # macOS / Linux
    brew install calvin-mcdowell/tap/batesian

    # Go
    go install github.com/calvin-mcdowell/batesian/cmd/batesian@{{.Tag}}

    # Binary — download from assets below, then:
    chmod +x batesian && sudo mv batesian /usr/local/bin/
    ```

  footer: |
    **Full changelog**: https://github.com/calvin-mcdowell/batesian/compare/{{.PreviousTag}}...{{.Tag}}
